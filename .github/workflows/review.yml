name: Claude Code Review

on:
  pull_request:
    types: [opened, reopened]

jobs:
  claude:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: --allowedTools "Bash(gh pr comment:*),Bash(gh pr view:*),Bash(gh pr diff:*),Bash(git fetch:*)"
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}
            Review this pull request. Cover:
            1. One-sentence summary of what this PR does
            2. Bugs or logic errors
            3. Security concerns
            4. Code quality and maintainability
            5. Missing tests or docs
            6. Overall verdict (approve / needs changes)
            Be concise and constructive. Flag blockers clearly.
